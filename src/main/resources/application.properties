# ===============================
# Server 設定
# ===============================
# 預設啟動的 Port
server.port=8080

# ===============================
# Database 資料庫連線設定 (PostgreSQL)
# ===============================
# 本機開發用 docker-compose 啟動的 Postgres；正式環境（Render）會用環境變數覆蓋這幾個值
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/blog_admin_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate 設定
# ===============================
# 在 Console 印出 JPA 幫我們產生的 SQL 語法 (開發階段強烈建議開啟，方便除錯)
spring.jpa.show-sql=true
# 將印出的 SQL 語法排版變漂亮
spring.jpa.properties.hibernate.format_sql=true
# 交由 Hibernate 自動根據 Entity 類別建立或更新資料表 (update: 如果表不存在就建立，有變動就更新)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT 自訂設定 (給 Security 驗證用)
# ===============================
# JWT 的密鑰 (Secret Key)，長度建議大於 256 bits；正式環境請用環境變數 JWT_SECRET 覆蓋，不要用這個預設值
jwt.secret=${JWT_SECRET:NeutecBlogAdminSystemSecretKeyForJwtAuthenticationNeedToBeLong}
# JWT 的有效期限 (單位為毫秒，這裡是 24 小時 = 86400000 毫秒)
jwt.expiration=86400000

# ===============================
# 日誌 (Logging) 設定
# ===============================
# 顯示 Spring Security 內部的詳細運作流程 (如果被擋在門外，看這裡最準)
logging.level.org.springframework.security=DEBUG

# 把 Hibernate SQL 裡面的 '?' 實際綁定的參數值印出來 (這是 Spring Boot 3.x 的寫法)
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# 如果你用的是 Spring Boot 2.x，請用下面這行取代上面那行：
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# LINE Messaging API 設定
# ===============================
# 這三項必須用環境變數提供（LINE_CHANNEL_SECRET / LINE_CHANNEL_ACCESS_TOKEN / LINE_CHANNEL_ID），
# 故意不在這裡放真實預設值，因為這個檔案會被推上 git，真實憑證不能進版本控制。
# 本機開發請在你自己的環境變數或 IDE 的 Run Configuration 裡設定這三個值。
line.channel-secret=${LINE_CHANNEL_SECRET:}
line.channel-access-token=${LINE_CHANNEL_ACCESS_TOKEN:}
line.channel-id=${LINE_CHANNEL_ID:}