# ===============================
# Server 設定
# ===============================
# 預設啟動的 Port
server.port=8080

# ===============================
# Database 資料庫連線設定 (MySQL)
# ===============================
# 請將 blog_admin_db 換成你本地的資料庫名稱，並確認有事先在 MySQL 建立這個 DB
spring.datasource.url=jdbc:mysql://localhost:3306/blog_admin_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Taipei
# 替換成你的 MySQL 帳號
spring.datasource.username=root
# 替換成你的 MySQL 密碼
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate 設定
# ===============================
# 在 Console 印出 JPA 幫我們產生的 SQL 語法 (開發階段強烈建議開啟，方便除錯)
spring.jpa.show-sql=true
# 將印出的 SQL 語法排版變漂亮
spring.jpa.properties.hibernate.format_sql=true
# 交由 Hibernate 自動根據 Entity 類別建立或更新資料表 (update: 如果表不存在就建立，有變動就更新)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# JWT 自訂設定 (給 Security 驗證用)
# ===============================
# JWT 的密鑰 (Secret Key)，長度建議大於 256 bits
jwt.secret=NeutecBlogAdminSystemSecretKeyForJwtAuthenticationNeedToBeLong
# JWT 的有效期限 (單位為毫秒，這裡是 24 小時 = 86400000 毫秒)
jwt.expiration=86400000

# ===============================
# 日誌 (Logging) 設定
# ===============================
# 顯示 Spring Security 內部的詳細運作流程 (如果被擋在門外，看這裡最準)
logging.level.org.springframework.security=DEBUG

# 把 Hibernate SQL 裡面的 '?' 實際綁定的參數值印出來 (這是 Spring Boot 3.x 的寫法)
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# 如果你用的是 Spring Boot 2.x，請用下面這行取代上面那行：
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE