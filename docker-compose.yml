version: '3.8'

services:
  mysql:
    image: mysql:8.0.35
    container_name: blog_admin_mysql
    ports:
      - "3306:3306"
    environment:
      # 設定 root 密碼（對應我們 application.properties 裡的設定）
      MYSQL_ROOT_PASSWORD: 123456
      # 啟動時自動建立我們需要的空資料庫
      MYSQL_DATABASE: blog_admin_db
      # 設定時區
      TZ: Asia/Taipei
    volumes:
      # 讓資料持久化，避免容器重啟後資料不見
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data: