version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: blog_admin_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: 123456
      # 啟動時自動建立我們需要的空資料庫
      POSTGRES_DB: blog_admin_db
      TZ: Asia/Taipei
    volumes:
      # 讓資料持久化，避免容器重啟後資料不見
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
